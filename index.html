<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CS:GO Offline Inventory Manager</title>
    <style>
        :root {
            --bg-main: #1b2838; --bg-sidebar: #171a21; --bg-card: #202326; --bg-card-hover: #2a475e;
            --border-card: #3c3d3e; --accent: #66c0f4; --text-main: #8f98a0; --text-hover: #ffffff; 
            --btn-green-top: #a4d007; --btn-green-bot: #536904; --danger: #cc3333; 
            --stattrak: #cf6a32; --gold: #d4af37;
        }
        body {
            margin: 0; font-family: 'Motiva Sans', 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-main); color: var(--text-hover); display: flex; height: 100vh; overflow: hidden;
        }
        
        .sidebar {
            width: 260px; background-color: var(--bg-sidebar); padding: 20px 10px;
            display: flex; flex-direction: column; gap: 4px; z-index: 20; box-shadow: 2px 0 5px rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        .sidebar h2 { 
            color: var(--text-hover); font-size: 16px; margin: 10px 10px 20px 10px;
            text-transform: uppercase; font-weight: normal; letter-spacing: 1px;
            border-bottom: 1px solid #2a475e; padding-bottom: 10px;
        }
        .category-btn {
            background: none; border: none; color: var(--text-main); text-align: left;
            padding: 10px 15px; font-size: 14px; cursor: pointer; transition: 0.2s; border-radius: 2px;
        }
        .category-btn:hover { color: var(--text-hover); background: rgba(102, 192, 244, 0.1); }
        .category-btn.active {
            background-color: var(--bg-card-hover); color: var(--text-hover); border-left: 3px solid var(--accent);
        }
        .stats { margin-top: auto; padding: 20px 10px; font-size: 13px; color: var(--text-main); text-align: center; border-top: 1px solid #2a475e;}
        
        .main-wrapper { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .topbar {
            background-color: rgba(0,0,0,0.2); padding: 0 20px; display: flex; gap: 5px;
            border-bottom: 1px solid rgba(0,0,0,0.5); z-index: 10; height: 60px; align-items: flex-end;
            justify-content: space-between;
        }
        
        .nav-tabs { display: flex; height: 100%; align-items: flex-end; }
        .nav-btn {
            background: rgba(0,0,0,0.3); color: var(--accent); border: none; padding: 15px 20px;
            cursor: pointer; font-size: 14px; transition: 0.2s; border-top-left-radius: 3px;
            border-top-right-radius: 3px; border-top: 3px solid transparent; text-transform: uppercase; font-weight: bold;
            margin-right: 2px;
        }
        .nav-btn:hover { background: rgba(0,0,0,0.5); color: var(--text-hover); }
        .nav-btn.active { background: var(--bg-main); color: var(--text-hover); border-top-color: var(--accent); }

        .file-actions { display: flex; gap: 10px; margin-bottom: 10px; align-items: center;}
        .btn-small {
            background: rgba(102, 192, 244, 0.1); color: var(--accent); border: 1px solid var(--accent);
            padding: 8px 12px; font-size: 12px; border-radius: 2px; cursor: pointer; transition: 0.2s; font-weight: bold;
        }
        .btn-small:hover { background: var(--accent); color: #000; }
        .file-status { font-size: 11px; color: #cf6a32; font-weight: bold;}

        .main-content { padding: 20px; display: flex; flex-direction: column; overflow-y: auto; flex-grow: 1; }
        
        .search-container { display: flex; gap: 10px; margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 3px;}
        .search-input {
            flex-grow: 1; padding: 10px 15px; background-color: #101214; border: 1px solid #000;
            color: white; border-radius: 3px; font-size: 14px; box-shadow: inset 0 0 4px #000;
        }
        .search-input:focus { outline: none; border-color: var(--accent); }
        
        .options-bar {
            display: flex; gap: 15px; align-items: center; margin-bottom: 20px; padding: 15px;
            background-color: rgba(0,0,0,0.3); border-radius: 3px; flex-wrap: wrap; border: 1px solid #2a475e;
        }
        .opt-group { display: flex; align-items: center; gap: 8px; }
        .opt-label { font-size: 13px; color: var(--text-main); }
        .opt-input {
            padding: 8px; background: #101214; border: 1px solid #000; color: #fff;
            border-radius: 2px; font-size: 13px; width: 100px;
        }
        .opt-input.wide { width: 160px; }
        .st-checkbox { accent-color: var(--stattrak); cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; align-content: start; }
        
        .card {
            background-color: var(--bg-card); padding: 10px; cursor: pointer;
            transition: all 0.1s; display: flex; flex-direction: column; justify-content: space-between; 
            align-items: center; text-align: center; border: 1px solid var(--border-card); position: relative; min-height: 200px;
        }
        .card:hover { background-color: var(--bg-card-hover); border-color: var(--accent); }
        
        .card-img { width: 100%; height: 100px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.8)); }
        .card .id-badge { font-size: 10px; color: var(--text-main); margin-bottom: 5px; background: rgba(0,0,0,0.5); padding: 3px 6px; border-radius: 3px;}
        .card .name { font-size: 13px; color: #d2d2d2; word-break: break-word;}
        .card:hover .name { color: #ffffff; }
        .card .custom-name { font-size: 12px; color: var(--gold); font-style: italic; margin-top: 5px;}
        .card .float-pattern { font-size: 11px; color: #888; margin-top: 5px;}
        
        .inventory-card { border-top: 3px solid var(--accent); }
        .st-badge { position: absolute; top: 5px; right: 5px; color: var(--stattrak); font-size: 11px; font-weight: bold; text-shadow: 1px 1px 2px #000;}
        
        .action-btn {
            margin-top: 15px; padding: 8px; border-radius: 2px; cursor: pointer; 
            font-size: 13px; border: none; width: 100%; font-weight: bold; transition: 0.2s;
        }
        .add-btn { background: linear-gradient(to bottom, var(--btn-green-top) 5%, var(--btn-green-bot) 95%); color: #d2efa9; }
        .add-btn:hover { background: linear-gradient(to bottom, #b9eb0a 5%, #6a8605 95%); color: white; }
        
        .delete-btn { background: rgba(204, 51, 51, 0.1); border: 1px solid #cc3333; color: #cc3333; }
        .delete-btn:hover { background: #cc3333; color: white; }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #101214; }
        ::-webkit-scrollbar-thumb { background-color: #3c3d3e; border: 1px solid #101214; }
        ::-webkit-scrollbar-thumb:hover { background-color: #4a4b4c; }

        #toast {
            visibility: hidden; min-width: 250px; background-color: #4c5b61; color: #fff; text-align: center; padding: 15px; position: fixed; border: 1px solid var(--accent);
            z-index: 100; right: 20px; bottom: 20px; font-size: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        #toast.show { visibility: visible; animation: fadein 0.2s, fadeout 0.2s 2.8s forwards; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 20px; opacity: 1;} }
        @keyframes fadeout { from {opacity: 1;} to {opacity: 0;} }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Filters</h2>
        <button class="category-btn active" onclick="filterCategory('All')">All Items</button>
        <button class="category-btn" onclick="filterCategory('Weapons')">Weapons</button>
        <button class="category-btn" onclick="filterCategory('Knives & Gloves')">Knives & Gloves</button>
        <button class="category-btn" onclick="filterCategory('Stickers')">Stickers</button>
        <button class="category-btn" onclick="filterCategory('Patches')">Patches</button>
        <button class="category-btn" onclick="filterCategory('Graffitis')">Graffitis</button>
        <button class="category-btn" onclick="filterCategory('Agents')">Agents</button>
        <button class="category-btn" onclick="filterCategory('Music Kits')">Music Kits</button>
        <button class="category-btn" onclick="filterCategory('Cases & Packages')">Cases & Packages</button>
        <button class="category-btn" onclick="filterCategory('Keys')">Keys</button>
        <button class="category-btn" onclick="filterCategory('Pins & Coins')">Pins & Coins</button>
        <button class="category-btn" onclick="filterCategory('Other')">Other</button>
        <div class="stats" id="statsCounter">Loading API...</div>
    </div>

    <div class="main-wrapper">
        <div class="topbar">
            <div class="nav-tabs">
                <button class="nav-btn active" id="btn-shop" onclick="switchView('shop')">Store & Generator</button>
                <button class="nav-btn" id="btn-inv" onclick="switchView('inventory')">My Inventory</button>
            </div>
            <div class="file-actions">
                <span id="itemsGameStatus" class="file-status">Missing items_game.txt</span>
                <input type="file" id="fileUploadItems" style="display:none;" accept=".txt" onchange="handleItemsGameUpload(event)">
                <button class="btn-small" onclick="document.getElementById('fileUploadItems').click()" style="border-color: #cf6a32; color: #cf6a32;">Load items_game.txt</button>
                
                <span style="margin: 0 10px; color:#424242;">|</span>
                
                <input type="file" id="fileUploadInv" style="display:none;" accept=".txt" onchange="handleInventoryUpload(event)">
                <button class="btn-small" onclick="document.getElementById('fileUploadInv').click()">Import inventory.txt</button>
                <button class="btn-small" onclick="exportInventory()">Export inventory.txt</button>
            </div>
        </div>

        <div class="main-content">
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search (e.g. dreams nightmare, ibp holo, awp)..." onkeyup="searchItems()">
            </div>
            
            <div class="options-bar" id="shopOptions">
                <div class="opt-group">
                    <span class="opt-label">Qty:</span>
                    <input type="number" id="itemQty" class="opt-input" value="1" min="1" max="500" style="width: 60px;">
                </div>
                <div class="opt-group">
                    <span class="opt-label" style="color:var(--gold);">Name Tag:</span>
                    <input type="text" id="customNameInput" class="opt-input wide" placeholder="e.g. 502 Goldz" maxlength="40">
                </div>
                <div class="opt-group">
                    <span class="opt-label">Pattern (7):</span>
                    <input type="number" id="patternInput" class="opt-input" placeholder="0-1000">
                </div>
                <div class="opt-group">
                    <span class="opt-label">Float (8):</span>
                    <input type="number" id="floatInput" class="opt-input" placeholder="e.g. 0.1295" step="0.0001">
                </div>
                <div class="opt-group" style="margin-left: 10px;">
                    <label class="opt-label" style="color: var(--stattrak); font-weight:bold; cursor:pointer;">
                        <input type="checkbox" id="chkStatTrak" class="st-checkbox" onchange="toggleStKills()"> StatTrak™
                    </label>
                    <input type="number" id="stKillsInput" class="opt-input" placeholder="Kills" style="display: none; width: 70px;" min="0">
                </div>
            </div>

            <div class="grid" id="itemGrid"></div>
        </div>
    </div>

    <div id="toast">Operation successful!</div>

    <script>
        // --- DATA STATE ---
        const FALLBACK_DEF_INDEX = {
            "weapon_deagle": "1", "weapon_elite": "2", "weapon_fiveseven": "3", "weapon_glock": "4",
            "weapon_ak47": "7", "weapon_aug": "8", "weapon_awp": "9", "weapon_famas": "10",
            "weapon_g3sg1": "11", "weapon_galilar": "13", "weapon_m249": "14", "weapon_m4a1": "16",
            "weapon_mac10": "17", "weapon_p90": "19", "weapon_mp5sd": "23", "weapon_ump45": "24",
            "weapon_xm1014": "25", "weapon_bizon": "26", "weapon_mag7": "27", "weapon_negev": "28",
            "weapon_sawedoff": "29", "weapon_tec9": "30", "weapon_taser" => "31", "weapon_hkp2000": "32",
            "weapon_mp7": "33", "weapon_mp9": "34", "weapon_nova": "35", "weapon_p250": "36",
            "weapon_scar20": "38", "weapon_sg556": "39", "weapon_ssg08": "40", "weapon_knifegg": "41", 
            "weapon_knife": "42", "weapon_flashbang": "43", "weapon_hegrenade": "44", "weapon_smokegrenade": "45", 
            "weapon_molotov": "46", "weapon_decoy": "47", "weapon_incgrenade": "48", "weapon_c4": "49", 
            "weapon_healthshot": "57", "weapon_knife_t": "59", "weapon_m4a1_silencer": "60",
            "weapon_usp_silencer": "61", "weapon_cz75a": "63", "weapon_revolver": "64",
            "weapon_bayonet": "500", "weapon_knife_css": "503", "weapon_knife_flip": "505", "weapon_knife_gut": "506",
            "weapon_knife_karambit": "507", "weapon_knife_m9_bayonet": "508", "weapon_knife_tactical": "509",
            "weapon_knife_falchion": "512", "weapon_knife_survival_bowie": "514", "weapon_knife_butterfly": "515",
            "weapon_knife_push": "516", "weapon_knife_cord": "517", "weapon_knife_canis": "518", 
            "weapon_knife_ursus": "519", "weapon_knife_gypsy_jackknife": "520", "weapon_knife_outdoor": "521", 
            "weapon_knife_stiletto": "522", "weapon_knife_widowmaker": "523", "weapon_knife_skeleton": "525",
            "weapon_knife_kukri": "526",
            "studded_bloodhound_gloves": "5027", "t_gloves": "5028", "ct_gloves": "5029", "sporty_gloves": "5030",
            "slick_gloves": "5031", "leather_handwraps": "5032", "motorcycle_gloves": "5033", "specialist_gloves": "5034",
            "studded_hydra_gloves": "5035", "studded_brokenfang_gloves": "4725",
            "weapon_sticker": "1209", "weapon_patch": "4746", "weapon_graffiti": "1348", "weapon_graffiti_unsealed": "1349"
        };

        const FALLBACK_IMG = "https://community.cloudflare.steamstatic.com/public/images/economy/appIconFallback/730.png";
        const API_URL = "https://raw.githubusercontent.com/ByMykel/CSGO-API/main/public/api/en/all.json";

        let RAW_API_DATA = [];
        let DEF_INDEX_MAP = { ...FALLBACK_DEF_INDEX };
        
        let CATALOG = {}; // id -> info
        let ALL_ITEMS_LIST = [];
        
        let CURRENT_INVENTORY_TEXT = `"csgo_inventory"\n{\n\t"account_id"\t\t"0"\n\t"item_count"\t\t"1"\n\t"items"\n\t{\n\t}\n}\n`;
        let PARSED_INVENTORY_ARRAY = [];

        let currentCategory = 'All';
        let currentView = 'shop';

        // --- INIT & CORE ---
        function showToast(message, isError=false) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.borderColor = isError ? "#cc3333" : "#66c0f4";
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        async function initApp() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("API Fetch failed");
                RAW_API_DATA = await response.json();
                
                buildCatalogFromData();
                showToast("API Loaded Successfully!");
            } catch(e) {
                showToast("Failed to load CSGO-API.", true);
                document.getElementById('statsCounter').innerText = "Network Error";
            }
        }

        // --- CATALOG BUILDER ---
        function extractItems(data, resultList) {
            if (Array.isArray(data)) {
                data.forEach(i => extractItems(i, resultList));
            } else if (typeof data === 'object' && data !== null) {
                if (data.id && data.name) {
                    resultList.push(data);
                } else {
                    Object.values(data).forEach(v => extractItems(v, resultList));
                }
            }
        }

        function buildCatalogFromData() {
            CATALOG = {};
            ALL_ITEMS_LIST = [];
            let items = [];
            extractItems(RAW_API_DATA, items);

            let API_SKINS = [];

            items.forEach(item => {
                let api_id = String(item.id).toLowerCase();
                let api_name = item.name;
                let api_image = item.image || '';

                if (api_id.startsWith("sticker-") || api_id.startsWith("patch-") || api_id.startsWith("graffiti-")) {
                    let kit_id = api_id.split("-").pop();
                    if (!isNaN(kit_id)) {
                        let def_idx, cat, prefix;
                        if (api_id.startsWith("sticker-")) { def_idx = "1209"; cat = "Stickers"; prefix = "sticker"; }
                        else if (api_id.startsWith("patch-")) { def_idx = "4746"; cat = "Patches"; prefix = "patch"; }
                        else { def_idx = "1348"; cat = "Graffitis"; prefix = "graffiti"; }
                        
                        let unique_id = `${prefix}_${kit_id}`;
                        if (!CATALOG[unique_id]) {
                            let obj = {id: def_idx, paint_index: "0", music_id: "0", kit_id: kit_id, name: api_name, internal_name: api_id, category: cat, image: api_image};
                            ALL_ITEMS_LIST.push(obj); CATALOG[unique_id] = obj;
                        }
                    }
                    return;
                }

                if (api_id.startsWith("crate-") || api_id.startsWith("key-") || api_id.startsWith("collectible-")) {
                    let def_index = api_id.split("-").pop();
                    if (!isNaN(def_index)) {
                        let cat = "Other";
                        if (api_id.startsWith("crate-")) cat = "Cases & Packages";
                        else if (api_id.startsWith("key-")) cat = "Keys";
                        else if (api_id.startsWith("collectible-")) cat = "Pins & Coins";
                        
                        let obj = {id: def_index, paint_index: "0", music_id: "0", kit_id: "0", name: api_name, internal_name: api_id, category: cat, image: api_image};
                        ALL_ITEMS_LIST.push(obj); CATALOG[def_index] = obj;
                    }
                    return;
                }

                if (api_id.startsWith("music_kit-")) {
                    let music_id = api_id.split("-").pop();
                    if (!isNaN(music_id)) {
                        let obj = {id: "1314", paint_index: "0", music_id: music_id, kit_id: "0", name: api_name, internal_name: api_id, category: "Music Kits", image: api_image};
                        ALL_ITEMS_LIST.push(obj); CATALOG[`music_${music_id}`] = obj;
                    }
                    return;
                }

                if (api_id.startsWith("agent-")) {
                    let agent_id = api_id.split("-").pop();
                    if (!isNaN(agent_id)) {
                        let obj = {id: agent_id, paint_index: "0", music_id: "0", kit_id: "0", name: api_name, internal_name: api_id, category: "Agents", image: api_image};
                        ALL_ITEMS_LIST.push(obj); CATALOG[agent_id] = obj;
                    }
                    return;
                }

                if (api_id.startsWith("skin-") || api_id.startsWith("glove-")) {
                    let weapon_internal = item.weapon && item.weapon.id ? String(item.weapon.id).toLowerCase() : '';
                    let paint_val = String(item.paint_index || item.paint_kit || '0');
                    if (weapon_internal) {
                        let cat = "Weapons";
                        if (weapon_internal.includes('knife') || weapon_internal.includes('bayonet') || weapon_internal.includes('karambit') || weapon_internal.includes('glove') || weapon_internal.includes('handwraps') || weapon_internal.includes('bloodhound')) {
                            cat = "Knives & Gloves";
                        }
                        API_SKINS.push({ api_id: api_id, name: api_name, weapon_internal: weapon_internal, paint_index: paint_val, category: cat, image: api_image });
                    }
                }
            });

            // Match Skins using def_index_map
            API_SKINS.forEach(skin => {
                let def_index = DEF_INDEX_MAP[skin.weapon_internal];
                if (def_index) {
                    let unique_id = `${def_index}_${skin.paint_index}`;
                    let obj = {id: def_index, paint_index: skin.paint_index, music_id: "0", kit_id: "0", name: skin.name, internal_name: skin.api_id, category: skin.category, image: skin.image};
                    ALL_ITEMS_LIST.push(obj);
                    CATALOG[unique_id] = obj;
                }
            });

            if (currentView === 'shop') searchItems();
            if (currentView === 'inventory') buildInventoryArray();
        }

        // --- LOCAL FILE PARSERS (items_game.txt) ---
        function handleItemsGameUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            showToast("Parsing items_game.txt locally...");
            document.getElementById('itemsGameStatus').innerText = "Loading local file...";
            document.getElementById('itemsGameStatus').style.color = "var(--text-white)";

            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                parseItemsGameText(text);
            };
            reader.readAsText(file);
            event.target.value = "";
        }

        function parseItemsGameText(text) {
            const lines = text.split(/\r?\n/);
            let in_items_block = false;
            let brace_level = 0;
            let current_item_id = null;
            let has_found_name = false;

            for (let i = 0; i < lines.length; i++) {
                let stripped = lines[i].trim();
                if (stripped.includes('//')) stripped = stripped.split('//')[0].trim();
                if (!stripped) continue;

                if (!in_items_block) {
                    if (stripped === '"items"') in_items_block = true;
                    continue;
                }

                let temp_brace = brace_level;
                if (temp_brace === 1 && stripped.startsWith('"')) {
                    let m = stripped.match(/^"(\d+)"$/);
                    if (m) {
                        current_item_id = m[1];
                        has_found_name = false;
                    }
                }

                if (stripped.includes('{')) brace_level += (stripped.match(/\{/g) || []).length;
                
                if (brace_level >= 2 && current_item_id && !has_found_name) {
                    if (stripped.startsWith('"name"')) {
                        let m = stripped.match(/"name"\s*"([^"]+)"/);
                        if (m) {
                            let item_name = m[1];
                            has_found_name = true;
                            DEF_INDEX_MAP[item_name.toLowerCase()] = current_item_id;
                            
                            if (!CATALOG[current_item_id]) {
                                CATALOG[current_item_id] = {id: current_item_id, paint_index: "0", music_id: "0", kit_id: "0", name: item_name, internal_name: item_name, category: "Other", image: ""};
                            }
                        }
                    }
                }

                if (stripped.includes('}')) {
                    brace_level -= (stripped.match(/\}/g) || []).length;
                    if (brace_level <= 0) break;
                }
            }
            
            document.getElementById('itemsGameStatus').innerText = "items_game.txt: OK";
            document.getElementById('itemsGameStatus').style.color = "var(--btn-green-top)";
            showToast("items_game.txt successfully parsed!");
            
            // Rebuild everything to match new IDs
            buildCatalogFromData();
        }


        // --- INVENTORY MANAGEMENT ---
        function handleInventoryUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                CURRENT_INVENTORY_TEXT = e.target.result;
                showToast("Inventory imported!");
                if (currentView === 'inventory') {
                    buildInventoryArray();
                }
            };
            reader.readAsText(file);
            event.target.value = "";
        }

        function exportInventory() {
            const blob = new Blob([CURRENT_INVENTORY_TEXT], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "inventory.txt";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function buildInventoryArray() {
            PARSED_INVENTORY_ARRAY = [];
            const lines = CURRENT_INVENTORY_TEXT.split(/\r?\n/);
            
            let current_inv_id = null; let current_def_idx = null; let current_paint_idx = "0";
            let current_music_id = "0"; let current_kit_id = "0"; let current_custom_name = null;
            let current_pattern = null; let current_wear = null; let is_stattrak = false; let st_kills = 0;
            let brace_level = 0; let in_item_block = false;

            lines.forEach(line => {
                let stripped = line.trim();
                
                if (stripped.includes('}')) {
                    brace_level -= (stripped.match(/\}/g) || []).length;
                    if (brace_level === 1 && in_item_block) {
                        if (current_inv_id && current_def_idx) {
                            let unique_id = current_def_idx;
                            if (current_music_id !== "0") unique_id = `music_${current_music_id}`;
                            else if (current_kit_id !== "0") {
                                if (current_def_idx === "1209") unique_id = `sticker_${current_kit_id}`;
                                else if (current_def_idx === "4746") unique_id = `patch_${current_kit_id}`;
                                else if (["1348", "1349"].includes(current_def_idx)) unique_id = `graffiti_${current_kit_id}`;
                            }
                            else if (current_paint_idx !== "0") unique_id = `${current_def_idx}_${current_paint_idx}`;

                            let info = CATALOG[unique_id] || CATALOG[current_def_idx] || {};
                            
                            PARSED_INVENTORY_ARRAY.push({
                                inv_id: current_inv_id, def_index: current_def_idx, paint_index: current_paint_idx,
                                music_id: current_music_id, kit_id: current_kit_id, custom_name: current_custom_name,
                                pattern: current_pattern, wear: current_wear, name: info.name || `Unknown Item (${current_def_idx})`,
                                category: info.category || 'Other', image: info.image || '', is_stattrak: is_stattrak, st_kills: st_kills
                            });
                        }
                        in_item_block = false;
                        current_inv_id = null; current_def_idx = null; current_paint_idx = "0"; current_music_id = "0"; current_kit_id = "0";
                        current_custom_name = null; current_pattern = null; current_wear = null; is_stattrak = false; st_kills = 0;
                    }
                }

                if (brace_level === 1 && !in_item_block) {
                    let m = stripped.match(/^"(\d+)"$/);
                    if (m) { current_inv_id = m[1]; in_item_block = true; }
                }

                if (stripped.includes('{')) brace_level += (stripped.match(/\{/g) || []).length;

                if (in_item_block) {
                    let m_def = stripped.match(/"def_index"\s*"(\d+)"/); if (m_def) current_def_idx = m_def[1];
                    let m_name = stripped.match(/"custom_name"\s*"([^"]+)"/); if (m_name) current_custom_name = m_name[1];
                    let m_6 = stripped.match(/"6"\s*"([0-9.]+)"/); if (m_6) current_paint_idx = String(parseInt(m_6[1]));
                    let m_7 = stripped.match(/"7"\s*"([0-9.]+)"/); if (m_7) current_pattern = String(parseInt(m_7[1]));
                    let m_8 = stripped.match(/"8"\s*"([0-9.]+)"/); if (m_8) current_wear = m_8[1];
                    let m_137 = stripped.match(/"137"\s*"([0-9.]+)"/); if (m_137) current_kit_id = String(parseInt(m_137[1]));
                    let m_166 = stripped.match(/"166"\s*"([0-9.]+)"/); if (m_166) current_music_id = String(parseInt(m_166[1]));
                    let m_80 = stripped.match(/"80"\s*"([0-9.]+)"/); if (m_80) { is_stattrak = true; st_kills = parseInt(m_80[1]); }
                }
            });
            
            searchItems();
        }

        // --- ADD / DELETE LOGIC (Modifying VDF String) ---
        function addItem(btn, id, paint_index, music_id, kit_id, name) {
            const quantity = parseInt(document.getElementById('itemQty').value) || 1;
            const customName = document.getElementById('customNameInput').value.trim();
            const pattern = document.getElementById('patternInput').value.trim();
            const wear = document.getElementById('floatInput').value.trim();
            
            const isStatTrakElem = document.getElementById('chkStatTrak');
            const isStatTrak = isStatTrakElem ? isStatTrakElem.checked : false;
            const stKills = isStatTrak && document.getElementById('stKillsInput') ? parseInt(document.getElementById('stKillsInput').value) || 0 : 0;
            
            let lines = CURRENT_INVENTORY_TEXT.split(/\r?\n/);
            let last_idx = 0;
            lines.forEach(l => {
                let m = l.trim().match(/^"(\d+)"$/);
                if (m) last_idx = Math.max(last_idx, parseInt(m[1]));
            });

            let insert_idx = -1;
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].includes('"default_equips"')) {
                    for (let j = i - 1; j >= 0; j--) {
                        if (lines[j].includes('}')) { insert_idx = j; break; }
                    }
                    break;
                }
            }
            if (insert_idx === -1) {
                for (let i = lines.length - 1; i >= 0; i--) {
                    if (lines[i].includes('}')) { insert_idx = i; break; }
                }
            }

            let attrs = [];
            if (paint_index !== "0") attrs.push(`\t\t\t"6"\t\t"${paint_index}.000000"`);
            if (pattern !== "") { let p_val = !isNaN(pattern) ? `${parseInt(pattern)}.000000` : pattern; attrs.push(`\t\t\t"7"\t\t"${p_val}"`); }
            if (wear !== "") attrs.push(`\t\t\t"8"\t\t"${wear}"`);
            if (kit_id !== "0") attrs.push(`\t\t\t"137"\t\t"${kit_id}.000000"`);
            if (music_id !== "0") attrs.push(`\t\t\t"166"\t\t"${music_id}.000000"`);
            if (isStatTrak) attrs.push(`\t\t\t"80"\t\t"${st_kills}.000000"`);

            let attr_block = "";
            if (attrs.length > 0) attr_block = `\n\t\t"attributes"\n\t\t{\n${attrs.join('\n')}\n\t\t}`;
            
            let custom_name_str = customName !== "" ? `\n\t\t"custom_name"\t\t"${customName}"` : "";

            let new_items = [];
            for (let k = 0; k < quantity; k++) {
                last_idx++;
                let str = `\t"${last_idx}"\n\t{\n\t\t"inventory"\t\t"${last_idx}"\n\t\t"def_index"\t\t"${id}"\n\t\t"level"\t\t"1"\n\t\t"quality"\t\t"3"\n\t\t"flags"\t\t"0"\n\t\t"origin"\t\t"24"${custom_name_str}\n\t\t"in_use"\t\t"0"\n\t\t"rarity"\t\t"6"${attr_block}\n\t}`;
                new_items.push(...str.split('\n'));
            }

            lines.splice(insert_idx, 0, ...new_items);
            CURRENT_INVENTORY_TEXT = lines.join('\n');
            
            let msg = quantity > 1 ? `Added ${quantity}x ${name}` : `Added ${name}`;
            showToast(msg);
            
            if (currentView === 'inventory') buildInventoryArray();
        }

        function deleteItem(inv_id, name) {
            let lines = CURRENT_INVENTORY_TEXT.split(/\r?\n/);
            let new_lines = [];
            let skip_mode = false;
            let bracket_count = 0;
            let seen_first_bracket = false;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                if (skip_mode) {
                    if (line.includes('{')) { bracket_count += (line.match(/\{/g) || []).length; seen_first_bracket = true; }
                    if (line.includes('}')) { bracket_count -= (line.match(/\}/g) || []).length; }
                    if (seen_first_bracket && bracket_count <= 0) skip_mode = false;
                    continue;
                }

                let m = line.trim().match(/^"(\d+)"$/);
                if (m && m[1] === String(inv_id)) {
                    skip_mode = true;
                    bracket_count = 0;
                    seen_first_bracket = false;
                    if (line.includes('{')) { bracket_count += (line.match(/\{/g) || []).length; seen_first_bracket = true; }
                    continue;
                }
                new_lines.push(line);
            }

            CURRENT_INVENTORY_TEXT = new_lines.join('\n');
            showToast("Removed " + name, true);
            buildInventoryArray();
        }

        // --- UI & INTERACTIONS ---
        function switchView(view) {
            currentView = view;
            document.getElementById('btn-shop').classList.toggle('active', view === 'shop');
            document.getElementById('btn-inv').classList.toggle('active', view === 'inventory');
            
            if(view === 'shop') {
                document.getElementById('searchInput').placeholder = "Search for items...";
                document.getElementById('shopOptions').style.display = 'flex';
                searchItems();
            } else {
                document.getElementById('searchInput').placeholder = "Search in your local inventory...";
                document.getElementById('shopOptions').style.display = 'none';
                buildInventoryArray();
            }
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            searchItems();
        }

        function toggleStKills() {
            const chk = document.getElementById('chkStatTrak');
            const stInput = document.getElementById('stKillsInput');
            stInput.style.display = chk.checked ? 'block' : 'none';
            if(chk.checked && !stInput.value) stInput.value = 0;
        }

        function searchItems() {
            let query = document.getElementById('searchInput').value.toLowerCase().trim();
            query = query.replace(/&/g, 'and').replace(/\ban\b/g, 'and');
            const searchTerms = query.split(/\s+/).filter(word => word.length > 0);

            if(currentView === 'shop') {
                const filtered = ALL_ITEMS_LIST.filter(item => {
                    const matchCat = (currentCategory === 'All' || item.category === currentCategory);
                    let searchPool = (item.name + " " + item.internal_name + " " + item.id).toLowerCase();
                    searchPool = searchPool.replace(/&/g, 'and');
                    
                    if (item.category === 'Cases & Packages') searchPool += " case crate package box bundle capsule";
                    if (item.category === 'Music Kits') searchPool += " music kit sound";
                    if (item.category === 'Agents') searchPool += " agent character skin";
                    if (item.category === 'Stickers') searchPool += " sticker autocollant";

                    const matchSearch = searchTerms.every(term => searchPool.includes(term));
                    return matchCat && matchSearch;
                });
                renderGrid(filtered);
                document.getElementById('statsCounter').innerText = "Found " + filtered.length + " items";
            } else {
                const filtered = PARSED_INVENTORY_ARRAY.filter(item => {
                    const matchCat = (currentCategory === 'All' || item.category === currentCategory);
                    let searchPool = (item.name + " " + item.def_index + " " + (item.custom_name||"")).toLowerCase();
                    searchPool = searchPool.replace(/&/g, 'and');
                    
                    const matchSearch = searchTerms.every(term => searchPool.includes(term));
                    return matchCat && matchSearch;
                });
                renderGrid(filtered);
                document.getElementById('statsCounter').innerText = filtered.length + " items in inventory";
            }
        }

        function renderGrid(items) {
            const grid = document.getElementById('itemGrid');
            grid.innerHTML = '';
            const displayItems = items.slice(0, 1000);

            displayItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                if (currentView === 'inventory') card.classList.add('inventory-card');
                
                let pkStr = "";
                if(item.paint_index && item.paint_index !== "0") pkStr = ` | PK: ${item.paint_index}`;
                if(item.kit_id && item.kit_id !== "0") pkStr = ` | KIT: ${item.kit_id}`;
                if(item.music_id && item.music_id !== "0") pkStr = ` | MUS: ${item.music_id}`;
                
                let labelInfo = currentView === 'shop' ? `DEF: ${item.id}${pkStr}` : `INV: ${item.inv_id} | DEF: ${item.def_index}${pkStr}`;
                
                let customNameHtml = item.custom_name ? `<div class="custom-name">"${item.custom_name}"</div>` : '';
                
                let floatPatternHtml = "";
                if (item.pattern || item.wear) {
                    let p = item.pattern ? `P: ${item.pattern}` : "";
                    let w = item.wear ? `F: ${item.wear}` : "";
                    floatPatternHtml = `<div class="float-pattern">${p} ${w}</div>`;
                }

                let stBadge = item.is_stattrak ? `<div class="st-badge">ST™ (${item.st_kills})</div>` : '';
                let imgSrc = item.image ? item.image : FALLBACK_IMG;

                let btnHtml = currentView === 'shop' 
                    ? `<button class="action-btn add-btn" onclick="addItem(this, '${item.id}', '${item.paint_index || "0"}', '${item.music_id || "0"}', '${item.kit_id || "0"}', '${item.name.replace(/'/g, "\\'")}')">Add to Inventory</button>`
                    : `<button class="action-btn delete-btn" onclick="deleteItem('${item.inv_id}', '${item.name.replace(/'/g, "\\'")}')">Remove Item</button>`;

                card.innerHTML = `
                    <div style="width:100%; text-align:center;">
                        ${stBadge}
                        <img src="${imgSrc}" class="card-img" loading="lazy" alt="Image">
                        <div class="id-badge">${labelInfo}</div>
                        <div class="name">${item.name}</div>
                        ${customNameHtml}
                        ${floatPatternHtml}
                    </div>
                    ${btnHtml}
                `;
                grid.appendChild(card);
            });
        }

        // Start
        initApp();
    </script>
</body>
